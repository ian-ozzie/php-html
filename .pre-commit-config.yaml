repos:
  - repo: local
    hooks:
    - id: pint-format
      name: Pint format
      entry: composer run lint:fix
      language: system
      types: [php]
    - id: lint
      name: PHPStan + Pint
      entry: composer run lint
      language: system
      types: [php]
    - id: test
      name: PHPUnit test
      entry: composer run test
      language: system
      types: [php]
      always_run: true
      pass_filenames: false
